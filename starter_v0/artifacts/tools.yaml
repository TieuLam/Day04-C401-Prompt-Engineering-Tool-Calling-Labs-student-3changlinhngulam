# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Yêu cầu làm rõ thông tin thiếu hoặc xác nhận hành động trước khi thực hiện. Bắt buộc gọi khi thiếu tên tài khoản Twitter, thiếu link bài viết cần đọc, hoặc cần người dùng xác nhận có đồng ý gửi tin nhắn đi hay không."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi gửi người dùng."}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu phản hồi mong đợi: 'text' cho làm rõ thông tin thiếu, 'yes_no' cho xác nhận đồng ý gửi/thực hiện."}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn nếu có."}
      required: [question]

  - name: timeline
    description: "Lấy các bài đăng gần đây."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [screenname]

  - name: social_search
    description: "Tìm trên mạng xã hội."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [query]

  - name: lookup
    description: "Tra cứu thông tin hoặc tin tức thời sự trên internet. Tuyệt đối không ghép chữ 'news' hoặc 'tin tức' vào trong từ khóa tham số query khi chọn topic='news'."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa tìm kiếm sạch (ví dụ: 'AI' thay vì 'AI news')."}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại chủ đề tìm kiếm."}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Thời gian giới hạn của tin tức."}
        max_results: {type: integer, default: 5, description: "Số lượng kết quả."}
      required: [query]

  - name: fetch
    description: "Lấy nội dung từ một địa chỉ."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ"}
      required: [url]

  - name: format
    description: "Trình bày dữ liệu đã có thành văn bản."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Gửi một đoạn văn bản đi."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung"}
        confirmed: {type: boolean, default: false, description: "Cờ xác nhận"}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]

  # ---------------- M2 added tools ----------------
  - name: url_cleaner
    description: "Làm sạch URL trước khi fetch/cite bằng cách bỏ tracking params như utm_*, fbclid, gclid; giữ lại query params quan trọng."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "URL cần làm sạch"}
        keep_params:
          type: array
          default: []
          items: {type: string}
          description: "Danh sách query params luôn giữ lại"
        remove_params:
          type: array
          default: []
          items: {type: string}
          description: "Danh sách query params bổ sung cần xóa"
        remove_fragment: {type: boolean, default: true, description: "Có xóa phần #fragment hay không"}
      required: [url]

  - name: source_quality
    description: "Đánh giá sơ bộ chất lượng nguồn dựa trên URL/domain; dùng để ưu tiên nguồn official, academic, news và cảnh báo social/blog/shortlink."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "URL nguồn cần đánh giá"}
        claim_type:
          type: string
          enum: [general, medical, legal, financial, safety]
          default: "general"
          description: "Loại claim để tăng cảnh báo khi cần nguồn mạnh hơn"
      required: [url]

  - name: extract_entities
    description: "Trích xuất entity từ text: URL, email, ngày tháng, tiền tệ, hashtag, mention, và tên tổ chức có khả năng xuất hiện."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Văn bản cần trích xuất entity"}
        max_items: {type: integer, default: 20, description: "Số item tối đa cho mỗi nhóm"}
      required: [text]

  - name: dedupe_sources
    description: "Loại nguồn trùng lặp trong danh sách kết quả lookup/social/fetch theo URL, domain, title hoặc url_or_title."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách source item cần lọc trùng"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        unique_by:
          type: string
          enum: [url, domain, title, url_or_title]
          default: "url"
          description: "Tiêu chí lọc trùng"
        max_items: {type: integer, default: 20, description: "Số item unique tối đa trả về"}
      required: [items]

